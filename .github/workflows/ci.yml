name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Lint & Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - decisions-service
          - catalog-service
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências do serviço
        working-directory: src/${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff

      - name: Lint (ruff)
        working-directory: src/${{ matrix.service }}
        run: ruff check .

      - name: Testes (pytest)
        working-directory: src/${{ matrix.service }}
        run: python -m pytest -q

  compose-validate:
    name: Validar docker-compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker compose config
        run: docker compose config -q
